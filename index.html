<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小艾老师微课系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="video-section">
            <div class="video-header">
                <h1 id="courseTitle">📚 请选择课程</h1>
                <p>点击下方按钮开始探索数学奥秘</p>
            </div>
            <div class="video-container">
                <video id="courseVideo" controls preload="metadata">
                    您的浏览器不支持视频播放。
                </video>
                <div class="video-overlay" id="videoOverlay">
                    <div class="overlay-content">
                        <h2>请选择一门课程</h2>
                        <div class="course-selector">
                            <button class="start-btn" onclick="selectCourse('中点四边形')">中点四边形</button>
                            <button class="start-btn" onclick="selectCourse('完全平方和公式')" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">完全平方和公式</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="video-info">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="video-stats">
                    <span id="currentTime">0:00</span> / <span id="duration">0:00</span>
                </div>
            </div>
        </div>

        <div class="chat-section">
            <div class="chat-header">
                <div class="avatar">👩‍🏫</div>
                <div class="header-info">
                    <h2>小艾老师</h2>
                    <span class="status">在线</span>
                </div>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            
            <div class="chat-input-area">
                <textarea id="chatInput" placeholder="输入你的问题或答案..." rows="2"></textarea>
                <button class="send-btn" id="sendBtn">
                    <span>发送</span>
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div style="color: white;">老师正在思考中...</div>
    </div>

    <script src="main_v5.0_调度Agent适配版.js"></script>
</body>
</html>
